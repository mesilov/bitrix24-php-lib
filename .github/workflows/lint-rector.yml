name: Rector lint checks

on:
  push:
  pull_request:

jobs:
  static-analysis:
    name: "Rector"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/mesilov/bitrix24-php-lib:php-cli
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Install dependencies"
        run: composer update --no-interaction --no-progress --no-suggest

      - name: "Rector"
        run: vendor/bin/rector process --dry-run

      - name: "is Rector check succeeded"
        if: ${{ success() }}
        run: |
          echo '✅ Rector check pass, congratulations!'

      - name: "is PHPStan check failed"
        if: ${{ failure() }}
        run: |
          echo '::error:: ❗️ Rector check failed (╯°益°)╯彡┻━┻'
